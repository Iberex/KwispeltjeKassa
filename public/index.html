<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Speelplein-kassa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap');
  :root{--inkt:#2A2620;--papier:#FAF6EE;--rand:#EDE6D7;--zacht:#6F685C;--groen:#2F8F5B;--groenD:#256E47;--amber:#F5B23D;--coral:#E76A53}
  *{box-sizing:border-box}
  body{margin:0;background:var(--papier);color:var(--inkt);font-family:'Baloo 2',ui-rounded,'Segoe UI',system-ui,sans-serif}
  .wrap{max-width:480px;margin:0 auto;padding:0 16px 40px}
  .num{font-family:'Inter',system-ui,sans-serif;font-variant-numeric:tabular-nums}
  header{padding:22px 2px 14px;display:flex;align-items:center;gap:11px}
  .logo{width:42px;height:42px;border-radius:13px;background:var(--amber);display:grid;place-items:center;box-shadow:0 3px 0 #d99a26;color:#fff;font-size:22px}
  h1{font-size:21px;margin:0;line-height:1}
  .sub{font-size:13px;color:var(--zacht);font-weight:600}
  .scanbtn{width:100%;border:3px dashed var(--groen);background:#fff;border-radius:22px;padding:38px 20px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--inkt)}
  .scancirc{width:70px;height:70px;border-radius:20px;background:var(--groen);display:grid;place-items:center;box-shadow:0 4px 0 var(--groenD);color:#fff;font-size:32px}
  .btn{border:none;border-radius:14px;font-weight:700;font-size:16px;padding:14px 18px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;font-family:inherit}
  .btn-primary{background:var(--groen);color:#fff;box-shadow:0 3px 0 var(--groenD)}
  .btn-primary:disabled{opacity:.55}
  .btn-ghost{background:#fff;color:var(--inkt);border:2px solid var(--rand)}
  .card{background:#fff;border:2px solid var(--rand);border-radius:18px;padding:16px}
  .melding{display:flex;gap:9px;align-items:flex-start;border-radius:13px;padding:11px 14px;font-weight:600;font-size:13.5px;margin-bottom:14px}
  .ok{background:#EEF8F1;border:2px solid var(--groen);color:var(--groenD)}
  .warn{background:#FFF4EC;border:2px solid var(--coral);color:var(--coral)}
  .rij{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px dashed var(--rand)}
  .rij .oms{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rij .bedr{font-weight:600;font-size:14px;flex-shrink:0}
  select.thema{appearance:none;border:none;border-radius:999px;padding:4px 9px;font-family:inherit;font-weight:700;font-size:12px;color:#fff;cursor:pointer;flex-shrink:0}
  label{font-weight:700;font-size:13px;color:var(--zacht)}
  input[type=number],select.veld{appearance:none;width:100%;padding:12px 14px;border-radius:12px;border:2px solid var(--rand);background:#fff;font-size:15px;font-weight:600;color:var(--inkt);font-family:inherit}
  .spin{width:40px;height:40px;border:4px solid var(--rand);border-top-color:var(--groen);border-radius:50%;animation:s 1s linear infinite;margin:0 auto}
  @keyframes s{to{transform:rotate(360deg)}}
  .hide{display:none}
  .center{text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">☀️</div>
    <div><h1>Speelplein-kassa</h1><div class="sub">Scan je bon, alles komt in de Excel</div></div>
  </header>

  <div id="melding"></div>

  <!-- start -->
  <div id="start">
    <button class="scanbtn" onclick="document.getElementById('file').click()">
      <div class="scancirc">📷</div>
      <div style="font-weight:800;font-size:19px">Scan een bonnetje</div>
      <div class="sub center">Neem een foto van de kassabon.<br>De AI leest alles uit en kiest week en thema's.</div>
    </button>
    <input id="file" type="file" accept="image/*" capture="environment" class="hide" />
  </div>

  <!-- bezig -->
  <div id="bezig" class="hide card center" style="padding:46px 20px">
    <div class="spin"></div>
    <div style="font-weight:800;font-size:18px;margin-top:14px">De bon wordt uitgelezen…</div>
    <div class="sub" style="margin-top:4px">Even geduld, dit duurt een paar tellen.</div>
  </div>

  <!-- controle -->
  <div id="controle" class="hide">
    <div id="leesmelding" class="melding"></div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
        <div id="cWinkel" style="font-weight:800;font-size:18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
        <div id="cDatum" class="num sub"></div>
      </div>
      <div class="sub" style="margin:10px 0 6px">Wat de AI las — tik op een thema om te wijzigen</div>
      <div id="cItems"></div>
    </div>
    <div style="display:flex;gap:12px;margin-top:16px">
      <div style="flex:1">
        <label>Totaalbedrag</label>
        <div style="position:relative;margin-top:6px">
          <span class="num" style="position:absolute;left:14px;top:13px;font-weight:700;color:var(--zacht)">€</span>
          <input id="cTotaal" type="number" step="0.01" inputmode="decimal" class="num" style="padding-left:30px;font-size:18px;font-weight:700" />
        </div>
      </div>
      <div style="flex:1">
        <label>Week</label>
        <select id="cWeek" class="veld" style="margin-top:6px"></select>
        <div class="sub" id="cWeekHint" style="font-size:11.5px;margin-top:4px"></div>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-ghost" style="width:auto;padding:14px 16px" onclick="reset()">↺ Opnieuw</button>
      <button id="bewaar" class="btn btn-primary" onclick="bewaar()">✓ Bewaar in Excel</button>
    </div>
  </div>

  <!-- klaar -->
  <div id="klaar" class="hide card center" style="padding:40px 20px">
    <div style="font-size:42px" id="klaarIcon">✅</div>
    <div id="klaarTekst" style="font-weight:800;font-size:19px;margin:8px 0 18px"></div>
    <button class="btn btn-primary" onclick="reset()">Volgende bon scannen</button>
  </div>
</div>

<script>
const THEMAS={Voedsel:'#E76A53',Drank:'#3D9BD1',Alcohol:'#8E5BB5',Spelmateriaal:'#2F8F5B',Knutselgerief:'#F5B23D',Kuisproducten:'#17A2A2',Varia:'#8A8276'};
const EMOJI={Voedsel:'🍞',Drank:'🥤',Alcohol:'🍺',Spelmateriaal:'⚽',Knutselgerief:'✂️',Kuisproducten:'🧽',Varia:'📦'};
const THEMA_NAMEN=Object.keys(THEMAS);
const WEKEN=["Opbouw","Week 1","Week 2","Week 3","Week 4","Week 5","Week 6","Week 7","Afbraak"];
let bon=null;

function toon(id){['start','bezig','controle','klaar'].forEach(x=>document.getElementById(x).classList.toggle('hide',x!==id));}
function melding(t,soort){const m=document.getElementById('melding');m.innerHTML=t?`<div class="melding ${soort||'warn'}">${t}</div>`:'';}
const euro=n=>(Number(n)||0).toLocaleString('nl-BE',{style:'currency',currency:'EUR'});

document.getElementById('file').addEventListener('change',async e=>{
  const f=e.target.files[0]; e.target.value=''; if(!f)return;
  melding(''); toon('bezig');
  try{
    const {base64,mime}=await verklein(f);
    const r=await fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'extract',image:base64,mimeType:mime})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.fout||'Uitlezen mislukt.');
    bon=d; toonControle(d);
  }catch(err){melding(err.message,'warn');toon('start');}
});

function verklein(file){return new Promise((res,rej)=>{
  const rd=new FileReader();
  rd.onload=()=>{const img=new Image();img.onload=()=>{
    const max=1600;let{width:w,height:h}=img;
    if(w>max||h>max){const s=Math.min(max/w,max/h);w=Math.round(w*s);h=Math.round(h*s);}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    const u=c.toDataURL('image/jpeg',0.82);res({base64:u.split(',')[1],mime:'image/jpeg'});
  };img.onerror=rej;img.src=rd.result;};
  rd.onerror=rej;rd.readAsDataURL(file);
});}

function toonControle(d){
  const lm=document.getElementById('leesmelding');
  const onlees=!d.leesbaar;
  lm.className='melding '+(onlees?'warn':'ok');
  lm.textContent=(onlees?'De foto is niet helemaal duidelijk. Controleer de bedragen en thema\'s of scan opnieuw.':'Duidelijk leesbaar. Kijk de thema\'s even na en bewaar.')+(d.opmerking?' — '+d.opmerking:'');
  if(d.dubbel)melding('Let op: een bon van deze winkel, datum en bedrag staat mogelijk al in de Excel.','warn');
  document.getElementById('cWinkel').textContent=d.winkel;
  document.getElementById('cDatum').textContent=d.datum;
  document.getElementById('cTotaal').value=d.totaal;
  const ws=document.getElementById('cWeek');ws.innerHTML=WEKEN.map(w=>`<option ${w===d.week?'selected':''}>${w}</option>`).join('');
  document.getElementById('cWeekHint').textContent='Automatisch uit '+d.datum;
  const wrap=document.getElementById('cItems');wrap.innerHTML='';
  if(!d.items.length)wrap.innerHTML='<div class="sub" style="padding:4px 0">Geen losse lijnen herkend — alles komt onder Varia.</div>';
  d.items.forEach((it,i)=>{
    const row=document.createElement('div');row.className='rij';
    const sel=document.createElement('select');sel.className='thema';sel.style.background=THEMAS[it.thema];
    sel.innerHTML=THEMA_NAMEN.map(t=>`<option value="${t}" ${t===it.thema?'selected':''} style="color:#000;background:#fff">${EMOJI[t]} ${t}</option>`).join('');
    sel.onchange=()=>{it.thema=sel.value;sel.style.background=THEMAS[sel.value];};
    const oms=document.createElement('span');oms.className='oms';oms.textContent=it.omschrijving;
    const bedr=document.createElement('span');bedr.className='num bedr';bedr.textContent=euro(it.bedrag);
    row.append(sel,oms,bedr);wrap.append(row);
  });
  toon('controle');
}

async function bewaar(){
  const btn=document.getElementById('bewaar');btn.disabled=true;btn.textContent='Bezig…';
  try{
    const r=await fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'save',winkel:bon.winkel,datum:bon.datum,
        week:document.getElementById('cWeek').value,totaal:document.getElementById('cTotaal').value,items:bon.items})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.fout||'Opslaan mislukt.');
    const ic=document.getElementById('klaarIcon'),tk=document.getElementById('klaarTekst');
    if(d.status==='dubbel'){ic.textContent='🔁';tk.textContent='Deze bon stond al in de Excel — niet dubbel toegevoegd.';}
    else{ic.textContent='✅';tk.textContent='Bewaard in de Excel!';}
    melding('');toon('klaar');
  }catch(err){melding(err.message,'warn');btn.disabled=false;btn.textContent='✓ Bewaar in Excel';}
}
function reset(){bon=null;melding('');toon('start');}
</script>
</body>
</html>
